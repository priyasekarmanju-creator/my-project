<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Aura Admin | Add Product</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

<style>
:root {
    --aura-purple: #663399;
    --aura-gold: #C5A059;
    --bg-soft: #f8f7ff;
}

body {
    font-family: 'Segoe UI', sans-serif;
    background: var(--bg-soft);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.card {
    background: white;
    padding: 40px;
    border-radius: 20px;
    width: 420px;
    box-shadow: 0 15px 35px rgba(102, 51, 153, 0.1);
}

h2 {
    text-align: center;
    color: var(--aura-purple);
}

.form-group {
    margin-bottom: 15px;
}

.input-box {
    position: relative;
}

.input-box i {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    color: gray;
}

input, select {
    width: 100%;
    padding: 12px 12px 12px 35px;
    border-radius: 8px;
    border: 1px solid #eee;
}

button {
    width: 100%;
    padding: 12px;
    background: var(--aura-purple);
    color: white;
    border: none;
    border-radius: 8px;
    margin-top: 10px;
    cursor: pointer;
}

button:hover {
    background: #4B2670;
}

#msg {
    text-align: center;
    margin-top: 10px;
}
</style>
</head>

<body>

<div class="card">

<h2>Add Product</h2>

<form id="productForm">

<div class="form-group">
<div class="input-box">
<i class="fas fa-box"></i>
<input type="text" id="name" placeholder="Product Name" required>
</div>
</div>

<div class="form-group">
<div class="input-box">
<i class="fas fa-rupee-sign"></i>
<input type="number" id="price" placeholder="Price" required>
</div>
</div>

<div class="form-group">
<div class="input-box">
<i class="fas fa-image"></i>
<input type="text" id="imageUrl" placeholder="Image URL" required>
</div>
</div>

<div class="form-group">
<div class="input-box">
<i class="fas fa-tags"></i>
<select id="category" required>
<option value="">✨ Select Category Type</option>
</select>
</div>
</div>

<button type="submit">ADD PRODUCT</button>

</form>

<p id="msg"></p>

</div>

<script>

const API = "http://localhost:8080";

// 🔥 LOAD CATEGORY TYPES
async function loadCategories() {
    try {
        const res = await fetch(`${API}/api/categories`);
        const data = await res.json();

        const dropdown = document.getElementById("category");

        data.forEach(cat => {
            const option = document.createElement("option");
            option.value = cat.id;
            option.textContent = cat.categoryName; // Skincare, Haircare...
            dropdown.appendChild(option);
        });

    } catch (err) {
        document.getElementById("msg").innerText = "❌ Failed to load categories";
    }
}

loadCategories();


// 🔥 ADD PRODUCT
document.getElementById("productForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    const msg = document.getElementById("msg");

    const product = {
        name: document.getElementById("name").value,
        price: document.getElementById("price").value,
        imageUrl: document.getElementById("imageUrl").value,
        category: {
            id: document.getElementById("category").value
        }
    };

    try {
        const res = await fetch(`${API}/api/products`, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(product)
        });

        if (res.ok) {
            msg.innerText = "✅ Product Added Successfully";
            msg.style.color = "green";
            document.getElementById("productForm").reset();
        } else {
            msg.innerText = "❌ Failed to add product";
            msg.style.color = "red";
        }

    } catch (err) {
        msg.innerText = "❌ Server Error";
        msg.style.color = "red";
    }
});

</script>

</body>
</html>
