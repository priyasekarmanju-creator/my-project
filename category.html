<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Categories | Aura Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --aura-purple: #6a3093;
            --aura-gold: #c5a059;
            --bg: #fdfbfd;
            --white: #ffffff;
        }

        body {
            margin: 0;
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            display: flex;
            height: 100vh;
        }

        /* --- Sidebar --- */
        .sidebar {
            width: 260px;
            background: var(--white);
            border-right: 2px solid var(--aura-gold);
            display: flex;
            flex-direction: column;
            padding: 20px 0;
            flex-shrink: 0;
        }

        .logo-section {
            padding: 0 25px 30px;
            color: var(--aura-purple);
            font-family: 'Playfair Display', serif;
            font-weight: bold;
            font-size: 1.5rem;
        }

        .menu-item {
            padding: 15px 25px;
            display: flex;
            align-items: center;
            gap: 15px;
            text-decoration: none;
            color: #444;
            font-weight: 600;
            transition: 0.3s;
            border-left: 4px solid transparent;
        }

        .menu-item.active {
            background: #f4eff9;
            color: var(--aura-purple);
            border-left: 4px solid var(--aura-gold);
        }

        /* --- Main Content --- */
        .main-content {
            flex-grow: 1;
            padding: 40px;
            overflow-y: auto;
        }

        .content-grid {
            display: grid;
            grid-template-columns: 400px 1fr;
            gap: 30px;
            align-items: start;
        }

        .card {
            background: var(--white);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(106, 48, 147, 0.05);
        }

        h2, h3 {
            font-family: 'Playfair Display';
            color: var(--aura-purple);
            margin-top: 0;
        }

        /* --- Form --- */
        .form-group {
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            font-family: 'Outfit';
        }

        .btn-save {
            background: var(--aura-purple);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-save:hover {
            background: var(--aura-gold);
        }

        /* --- Table --- */
        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            padding: 15px;
            background: #fdfaf5;
            color: var(--aura-purple);
            border-bottom: 2px solid #eee;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid #eee;
        }

        .delete-btn {
            color: #e74c3c;
            cursor: pointer;
            border: none;
            background: none;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="logo-section"><i class="fa-solid fa-leaf"></i> Aura Admin</div>
        <nav>
            <a href="dashboard.html" class="menu-item"><i class="fa-solid fa-gauge"></i> Dashboard</a>
            <a href="admin-orders.html" class="menu-item"><i class="fa-solid fa-cart-shopping"></i> Orders</a>
            <a href="add product.html" class="menu-item"><i class="fa-solid fa-plus"></i> Add Product</a>
            <a href="category.html" class="menu-item active"><i class="fa-solid fa-layer-group"></i> Categories</a>
            <a href="customers.html" class="menu-item"><i class="fa-solid fa-users"></i> Customers</a>
        </nav>
    </aside>

    <main class="main-content">
        <h2>Category Management</h2>

        <div class="content-grid">
            <div class="card">
                <h3>Create New Category</h3>
                <div class="form-group">
                    <label>Category Name</label>
                    <input type="text" id="categoryInput" placeholder="e.g., Skincare, Haircare">
                </div>
                <button class="btn-save" onclick="addCategory()">Save Category</button>
            </div>

            <div class="card">
                <h3>Existing Categories</h3>
                <table>
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Category Name</th>
                            <th style="text-align: right;">Action</th>
                        </tr>
                    </thead>
                    <tbody id="categoryListBody">
                        </tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        const API_URL = 'http://localhost:8080/api/admin';

        // 1. Fetch Categories
        async function fetchCategories() {
            try {
                const response = await fetch(`${API_URL}/categories`);
                const categories = await response.json();
                
                const tbody = document.getElementById('categoryListBody');
                tbody.innerHTML = categories.map((cat, index) => `
                    <tr>
                        <td>${index + 1}</td>
                        <td><b>${cat.category_name}</b></td>
                        <td style="text-align: right;">
                            <button class="delete-btn" onclick="deleteCategory(${cat.id})">
                                <i class="fa fa-trash"></i>
                            </button>
                        </td>
                    </tr>
                `).join('');
            } catch (err) {
                console.error("Error fetching categories:", err);
            }
        }

        // 2. Add Category
        async function addCategory() {
            const name = document.getElementById('categoryInput').value;
            if (!name) return alert("Please enter a category name!");

            try {
                const response = await fetch(`${API_URL}/add-category`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name })
                });

                if (response.ok) {
                    alert("Category Added Successfully!");
                    document.getElementById('categoryInput').value = '';
                    fetchCategories(); // Refresh list
                }
            } catch (err) {
                alert("Failed to add category.");
            }
        }

        // 3. Delete Category
        async function deleteCategory(id) {
            if (!confirm("Are you sure you want to delete this?")) return;

            try {
                const response = await fetch(`${API_URL}/delete-category/${id}`, {
                    method: 'DELETE'
                });

                if (response.ok) {
                    fetchCategories();
                }
            } catch (err) {
                alert("Delete failed.");
            }
        }

        window.onload = fetchCategories;
    </script>
</body>
</html>
