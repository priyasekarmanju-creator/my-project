<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aura Beauty | Product Details</title>

<!-- ✅ FIXED FONT -->
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
:root { --purple: #632e8a; --gold: #b89655; --bg: #fdfaf5; --white: #ffffff; }

body { margin: 0; font-family: 'Outfit', sans-serif; background: var(--bg); }

.header {
    position: fixed; top: 0; width: 100%; height: 80px;
    background: rgba(255,255,255,0.95);
    display: flex; justify-content: space-between; align-items: center;
    padding: 0 50px; border-bottom: 1px solid #eee;
}

.logo { font-size: 24px; color: var(--purple); text-decoration: none; font-weight: bold; }
.logo span { color: var(--gold); }

.product-container {
    max-width: 1000px; margin: 150px auto;
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 50px; background: white;
    padding: 40px; border-radius: 30px;
}

.product-image-box img { width: 100%; border-radius: 20px; }

.product-info h3 { font-size: 32px; color: var(--purple); }
.price { font-size: 26px; margin: 15px 0; }

.add-btn {
    background: var(--purple);
    color: white;
    padding: 12px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
}
</style>
</head>

<body>

<header class="header">
    <a href="index.html" class="logo"><span>Aura</span> Beauty</a>
</header>

<div id="p" class="product-container">
    Loading...
</div>

<script>
let product;
const id = new URLSearchParams(location.search).get("id");

async function load(){
    try {
        // ✅ FIXED API
        const res = await fetch("http://localhost:8080/api/products/" + id);

        if(!res.ok) throw new Error();

        product = await res.json();

        // ✅ FIXED IMAGE FIELD
        const img = product.imageUrl || "https://via.placeholder.com/400";

        document.getElementById("p").innerHTML = `
            <div class="product-image-box">
                <img src="${img}">
            </div>

            <div class="product-info">
                <h3>${product.name}</h3>
                <p>${product.category?.categoryName || "Beauty"}</p>
                <div class="price">₹${product.price}</div>

                <button class="add-btn" onclick="addToCart()">Add to Cart</button>
            </div>
        `;

    } catch {
        document.getElementById("p").innerHTML = "❌ Product not found";
    }
}

function addToCart(){
    let cart = JSON.parse(localStorage.getItem("cart")) || [];
    cart.push(product);
    localStorage.setItem("cart", JSON.stringify(cart));
    alert("Added to cart");
}

load();
</script>

</body>
</html>
