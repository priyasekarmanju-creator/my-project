<!DOCTYPE html>
<html>
<body>

<h2>All Products</h2>

<div id="products"></div>

<script>
async function load(){
 const res = await fetch("http://localhost:8080/api/product");
 const data = await res.json();

 let out="";
 data.forEach(p=>{
  out+=`
  <div>
    <h3>${p.name}</h3>
    <p>₹${p.price}</p>
    <a href="view-product.html?id=${p.id}">View</a>
  </div><hr>`;
 });

 document.getElementById("products").innerHTML=out;
}

load();
</script>

</body>
</html>
