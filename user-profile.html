<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>User Profile | Aura</title>

<style>
/* Import Poppins for a clean, modern look */
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');

body {
    font-family: 'Poppins', sans-serif;
    /* Aura Gradient Background */
    background: linear-gradient(135deg, #632e8a 0%, #9d50bb 50%, #6e48aa 100%);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
}

.box {
    background: rgba(255, 255, 255, 0.9);
    backdrop-filter: blur(10px); /* Frosted glass effect */
    padding: 40px;
    border-radius: 24px;
    width: 320px;
    text-align: center;
    box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
    border: 1px solid rgba(255, 255, 255, 0.3);
}

.profile-pic {
    width: 80px;
    height: 80px;
    background: linear-gradient(to bottom right, #632e8a, #ff00cc);
    border-radius: 50%;
    margin: 0 auto 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-size: 2rem;
    font-weight: 600;
}

h2 {
    color: #333;
    margin-bottom: 25px;
    font-weight: 600;
    letter-spacing: -0.5px;
}

.info-group {
    text-align: left;
    margin-bottom: 20px;
}

p {
    color: #666;
    font-size: 0.9rem;
    margin: 5px 0;
}

strong {
    color: #632e8a;
    display: block;
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 1px;
}

button {
    background: #632e8a;
    color: white;
    border: none;
    padding: 12px 30px;
    border-radius: 12px;
    font-family: 'Poppins', sans-serif;
    font-weight: 600;
    cursor: pointer;
    width: 100%;
    transition: all 0.3s ease;
    box-shadow: 0 4px 15px rgba(99, 46, 138, 0.3);
}

button:hover {
    background: #4a2268;
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(99, 46, 138, 0.4);
}

button:active {
    transform: translateY(0);
}
</style>
</head>

<body>

<div class="box">
    <div class="profile-pic">A</div>
    
    <h2>User Profile</h2>

    <div class="info-group">
        <strong>Name</strong>
        <p>Aura User</p>
    </div>

    <div class="info-group">
        <strong>Email</strong>
        <p>user@aura.com</p>
    </div>

    <button onclick="logout()">Logout</button>
</div>

<script>
function logout(){
    // Adding a slight delay for a smoother feel
    document.querySelector('.box').style.opacity = "0";
    document.querySelector('.box').style.transition = "0.5s";
    setTimeout(() => {
        window.location = "userlogin.html";
    }, 500);
}
</script>

</body>
</html>
