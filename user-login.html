<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aura Beauty | Login</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
:root {
    --purple: #632e8a;
    --gold: #b89655;
    --bg: #fdfaf5;
    --white: #ffffff;
}

body {
    margin: 0;
    font-family: 'Outfit', sans-serif;
    background: var(--bg);
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
}

.login-container {
    width: 900px;
    height: 550px;
    background: var(--white);
    display: flex;
    border-radius: 30px;
    overflow: hidden;
    box-shadow: 0 25px 50px rgba(0,0,0,0.1);
}

.login-visual {
    flex: 1;
    background: linear-gradient(rgba(99, 46, 138, 0.4), rgba(99, 46, 138, 0.4)),
    url('https://images.unsplash.com/photo-1596462502278-27bfdc4033c8?w=800');
    background-size: cover;
    background-position: center;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    color: white;
    text-align: center;
    padding: 40px;
}

.login-visual h2 {
    font-family: 'Playfair Display';
    font-size: 40px;
    margin-bottom: 10px;
}

.login-form-section {
    flex: 1;
    padding: 50px;
    display: flex;
    flex-direction: column;
    justify-content: center;
}

.logo {
    font-size: 28px;
    font-family: 'Playfair Display';
    color: var(--purple);
    text-decoration: none;
    margin-bottom: 30px;
}

.logo span { color: var(--gold); }

.form-group {
    margin-bottom: 20px;
    position: relative;
}

.form-group i {
    position: absolute;
    left: 15px;
    top: 40px;
    color: var(--purple);
    opacity: 0.6;
}

label {
    display: block;
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 8px;
}

input {
    width: 100%;
    padding: 12px 15px 12px 45px;
    border: 1px solid #eee;
    border-radius: 12px;
    background: #f9f9fb;
}

input:focus {
    outline: none;
    border-color: var(--purple);
    background: white;
}

.login-btn {
    background: var(--purple);
    color: white;
    border: none;
    padding: 14px;
    border-radius: 12px;
    width: 100%;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
}

.login-btn:disabled {
    opacity: 0.7;
    cursor: not-allowed;
}

#success-msg {
    display: none;
    position: fixed;
    top: 20px;
    right: 20px;
    background: var(--purple);
    color: white;
    padding: 15px 30px;
    border-radius: 10px;
}
</style>
</head>

<body>

<div id="success-msg"></div>

<div class="login-container">

    <div class="login-visual">
        <h2>Welcome Back</h2>
        <p>Your aura-enhancing journey continues here.</p>
    </div>

    <div class="login-form-section">

        <a href="#" class="logo"><span>Aura</span> Beauty</a>

        <form id="loginForm">

            <div class="form-group">
                <label>Email Address</label>
                <i class="fa fa-envelope"></i>
                <input type="email" id="email" required>
            </div>

            <div class="form-group">
                <label>Password</label>
                <i class="fa fa-lock"></i>
                <input type="password" id="password" required>
            </div>

            <button type="submit" class="login-btn">Sign In</button>

        </form>

    </div>
</div>

<script>
const API = "http://localhost:8080";

document.getElementById("loginForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    const btn = document.querySelector(".login-btn");
    const msg = document.getElementById("success-msg");

    btn.innerHTML = "⏳ Logging in...";
    btn.disabled = true;

    try {
        const res = await fetch(`${API}/api/user/login`, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ email, password })
        });

        if (!res.ok) {
            throw new Error("Invalid credentials");
        }

        const data = await res.json();

        // SAFE parsing (supports multiple backend formats)
        const user = data.user || data;

        // STORE SESSION
        localStorage.setItem("role", user.role);
        localStorage.setItem("name", user.name);
        if (data.token) {
            localStorage.setItem("token", data.token);
        }

        msg.innerText = `✨ Welcome ${user.name}`;
        msg.style.display = "block";

        setTimeout(() => {
            if (user.role === "ADMIN") {
                window.location.href = "dashboard.html";
            } else {
                window.location.href = "index.html";
            }
        }, 1200);

    } catch (err) {
        alert("❌ Login failed. Check email/password or backend.");
        console.error(err);

        btn.innerHTML = "Sign In";
        btn.disabled = false;
    }
});
</script>

</body>
</html>
