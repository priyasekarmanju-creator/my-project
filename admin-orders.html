<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura Beauty | Admin Orders</title>

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <script>
        const role = localStorage.getItem("userRole") || localStorage.getItem("role");
        if (!role || role !== "ADMIN") {
            window.location.href = "login.html";
        }
    </script>

    <style>
        :root {
            --purple: #632e8a;
            --gold: #b89655;
            --bg: #fdfaf5;
            --white: #ffffff;
            --red: #ff4b5c;
            --green: #28a745;
            --blue: #007bff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: #333;
            background-image: radial-gradient(circle at 90% 10%, rgba(184,150,85,0.05) 0%, transparent 40%);
        }

        /* NAV */
        nav {
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(10px);
            padding: 15px 8%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 30px rgba(0,0,0,0.04);
            position: sticky; top: 0; z-index: 1000;
        }
        .logo { font-family: 'Playfair Display'; font-size: 26px; text-decoration: none; color: var(--purple); }
        .logo span { color: var(--gold); }
        .nav-links { display: flex; gap: 35px; }
        .nav-links a { text-decoration: none; color: #555; font-weight: 500; font-size: 15px; transition: 0.3s; }
        .nav-links a:hover, .nav-links a.active { color: var(--gold); }
        .logout-btn {
            background: none; border: 1.5px solid #dcdcdc; padding: 8px 20px;
            border-radius: 50px; font-weight: 600; cursor: pointer; color: #666; transition: 0.3s;
            font-family: 'Outfit', sans-serif;
        }
        .logout-btn:hover { border-color: var(--red); color: var(--red); }

        /* CONTAINER */
        .container { padding: 40px 8%; max-width: 1400px; margin: auto; }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        .page-header h1 { font-family: 'Playfair Display'; font-size: 32px; color: #1e1e1e; }
        .page-header p { color: #888; margin-top: 5px; font-size: 14px; }

        /* STATS */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 35px;
        }
        .stat-card {
            background: var(--white);
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.03);
            text-align: center;
            border: 1px solid rgba(0,0,0,0.04);
        }
        .stat-card .icon { font-size: 22px; margin-bottom: 10px; }
        .stat-card h3 { font-size: 26px; color: var(--purple); margin-bottom: 5px; }
        .stat-card p { color: #888; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }

        /* FILTER BAR */
        .filter-bar {
            background: var(--white);
            padding: 20px 25px;
            border-radius: 16px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.03);
            margin-bottom: 25px;
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
        }
        .filter-bar input {
            flex: 1;
            min-width: 200px;
            padding: 10px 15px;
            border: 1.5px solid #eee;
            border-radius: 10px;
            font-family: 'Outfit', sans-serif;
            font-size: 14px;
            outline: none;
            transition: 0.3s;
        }
        .filter-bar input:focus { border-color: var(--purple); }
        .filter-bar select {
            padding: 10px 15px;
            border: 1.5px solid #eee;
            border-radius: 10px;
            font-family: 'Outfit', sans-serif;
            font-size: 14px;
            outline: none;
            cursor: pointer;
            background: white;
            transition: 0.3s;
        }
        .filter-bar select:focus { border-color: var(--purple); }

        /* TABLE */
        .section-box {
            background: var(--white);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
        }

        table { width: 100%; border-collapse: collapse; }
        thead tr { border-bottom: 2px solid var(--bg); }
        th { text-align: left; padding: 14px 16px; color: #888; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }
        td { padding: 16px; border-bottom: 1px solid #f5f5f5; font-size: 14px; vertical-align: middle; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: #fdfaf5; }

        /* BADGES */
        .badge {
            padding: 5px 14px;
            border-radius: 50px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .badge-processing { background: #fff3cd; color: #856404; }
        .badge-delivered  { background: #d1f5e0; color: #155724; }
        .badge-cancelled  { background: #fde8ea; color: #842029; }
        .badge-shipped    { background: #d0e8ff; color: #084298; }

        /* STATUS SELECT */
        .status-select {
            padding: 6px 10px;
            border: 1.5px solid #eee;
            border-radius: 8px;
            font-family: 'Outfit', sans-serif;
            font-size: 13px;
            cursor: pointer;
            outline: none;
            background: white;
        }
        .status-select:focus { border-color: var(--purple); }

        /* ACTION BUTTONS */
        .btn-view {
            background: var(--purple);
            color: white;
            border: none;
            padding: 7px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-family: 'Outfit', sans-serif;
            transition: 0.3s;
        }
        .btn-view:hover { background: #4e2470; }

        .btn-delete {
            color: var(--red);
            cursor: pointer;
            border: none;
            background: none;
            font-size: 16px;
            padding: 5px 8px;
            transition: 0.3s;
        }
        .btn-delete:hover { transform: scale(1.15); }

        /* EMPTY STATE */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #aaa;
        }
        .empty-state i { font-size: 48px; margin-bottom: 15px; color: #ddd; }
        .empty-state p { font-size: 16px; }

        /* LOADING */
        .loading {
            text-align: center;
            padding: 40px;
            color: #aaa;
            font-size: 15px;
        }
        .loading i { font-size: 30px; color: var(--purple); animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* MODAL */
        .modal-overlay {
            display: none;
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.4);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: white;
            border-radius: 20px;
            padding: 35px;
            width: 480px;
            max-width: 95%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
            animation: modalIn 0.3s ease;
        }
        @keyframes modalIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .modal h3 { font-family: 'Playfair Display'; font-size: 22px; margin-bottom: 20px; color: #1e1e1e; }
        .modal-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #f5f5f5; font-size: 14px; }
        .modal-row:last-of-type { border-bottom: none; }
        .modal-row span:first-child { color: #888; }
        .modal-row span:last-child { font-weight: 600; color: #333; }
        .modal-close {
            margin-top: 20px;
            width: 100%;
            padding: 12px;
            background: var(--purple);
            color: white;
            border: none;
            border-radius: 10px;
            font-family: 'Outfit', sans-serif;
            font-size: 15px;
            cursor: pointer;
            transition: 0.3s;
        }
        .modal-close:hover { background: #4e2470; }

        /* PAGINATION */
        .pagination {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 25px;
        }
        .pagination button {
            padding: 8px 14px;
            border: 1.5px solid #eee;
            border-radius: 8px;
            background: white;
            cursor: pointer;
            font-family: 'Outfit', sans-serif;
            font-size: 14px;
            transition: 0.3s;
        }
        .pagination button.active,
        .pagination button:hover { background: var(--purple); color: white; border-color: var(--purple); }
        .pagination button:disabled { opacity: 0.4; cursor: not-allowed; }
    </style>
</head>
<body>

<nav>
    <a href="dashboard.html" class="logo"><span>Aura</span> Beauty</a>
    <div class="nav-links">
        <a href="category.html">Categories</a>
        <a href="admin-orders.html" class="active">Orders</a>
        <a href="customers.html">Customers</a>
        <a href="add-product.html">Add Product</a>
    </div>
    <button class="logout-btn" onclick="logout()">Logout</button>
</nav>

<div class="container">

    <div class="page-header">
        <div>
            <h1>Orders</h1>
            <p>Manage and track all customer orders</p>
        </div>
    </div>

    <!-- STATS -->
    <div class="stats-grid">
        <div class="stat-card">
            <div class="icon" style="color: var(--gold);"><i class="fa-solid fa-bag-shopping"></i></div>
            <h3 id="total-orders">0</h3>
            <p>Total Orders</p>
        </div>
        <div class="stat-card">
            <div class="icon" style="color: #856404;"><i class="fa-solid fa-clock"></i></div>
            <h3 id="processing-count">0</h3>
            <p>Processing</p>
        </div>
        <div class="stat-card">
            <div class="icon" style="color: #084298;"><i class="fa-solid fa-truck"></i></div>
            <h3 id="shipped-count">0</h3>
            <p>Shipped</p>
        </div>
        <div class="stat-card">
            <div class="icon" style="color: var(--green);"><i class="fa-solid fa-circle-check"></i></div>
            <h3 id="delivered-count">0</h3>
            <p>Delivered</p>
        </div>
        <div class="stat-card">
            <div class="icon" style="color: var(--red);"><i class="fa-solid fa-circle-xmark"></i></div>
            <h3 id="cancelled-count">0</h3>
            <p>Cancelled</p>
        </div>
    </div>

    <!-- FILTER BAR -->
    <div class="filter-bar">
        <input type="text" id="searchInput" placeholder="🔍  Search by Order ID or Customer..." oninput="filterOrders()">
        <select id="statusFilter" onchange="filterOrders()">
            <option value="">All Status</option>
            <option value="PROCESSING">Processing</option>
            <option value="SHIPPED">Shipped</option>
            <option value="DELIVERED">Delivered</option>
            <option value="CANCELLED">Cancelled</option>
        </select>
    </div>

    <!-- ORDERS TABLE -->
    <div class="section-box">
        <div id="loading" class="loading">
            <i class="fa-solid fa-spinner"></i>
            <p style="margin-top:10px;">Loading orders...</p>
        </div>

        <table id="orders-table" style="display:none;">
            <thead>
                <tr>
                    <th>Order ID</th>
                    <th>Customer</th>
                    <th>Amount</th>
                    <th>Date</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="orders-body"></tbody>
        </table>

        <div id="empty-state" class="empty-state" style="display:none;">
            <i class="fa-solid fa-box-open"></i>
            <p>No orders found</p>
        </div>
    </div>

    <!-- PAGINATION -->
    <div class="pagination" id="pagination"></div>

</div>

<!-- ORDER DETAIL MODAL -->
<div class="modal-overlay" id="modalOverlay">
    <div class="modal">
        <h3>Order Details</h3>
        <div id="modal-content"></div>
        <button class="modal-close" onclick="closeModal()">Close</button>
    </div>
</div>

<script>
    const API = "http://localhost:8080";
    let allOrders = [];
    let filteredOrders = [];
    const PAGE_SIZE = 10;
    let currentPage = 1;

    function logout() {
        localStorage.clear();
        window.location.href = "login.html";
    }

    // ── FETCH ORDERS ──────────────────────────────────────────
    async function loadOrders() {
        try {
            const res = await fetch(API + "/api/order");
            if (!res.ok) throw new Error("Failed to fetch");
            allOrders = await res.json();
            filteredOrders = [...allOrders];
            updateStats();
            renderTable();
        } catch (err) {
            console.error("Error loading orders:", err);
            document.getElementById("loading").innerHTML = `
                <i class="fa-solid fa-triangle-exclamation" style="color:#ff4b5c;font-size:30px;"></i>
                <p style="margin-top:10px;color:#ff4b5c;">Failed to load orders. Check your backend.</p>
            `;
        }
    }

    // ── STATS ─────────────────────────────────────────────────
    function updateStats() {
        document.getElementById("total-orders").innerText     = allOrders.length;
        document.getElementById("processing-count").innerText = allOrders.filter(o => (o.status || "PROCESSING") === "PROCESSING").length;
        document.getElementById("shipped-count").innerText    = allOrders.filter(o => o.status === "SHIPPED").length;
        document.getElementById("delivered-count").innerText  = allOrders.filter(o => o.status === "DELIVERED").length;
        document.getElementById("cancelled-count").innerText  = allOrders.filter(o => o.status === "CANCELLED").length;
    }

    // ── FILTER ────────────────────────────────────────────────
    function filterOrders() {
        const search = document.getElementById("searchInput").value.toLowerCase();
        const status = document.getElementById("statusFilter").value;

        filteredOrders = allOrders.filter(o => {
            const matchSearch =
                String(o.id).includes(search) ||
                (o.customerName || "").toLowerCase().includes(search);
            const matchStatus = status === "" || (o.status || "PROCESSING") === status;
            return matchSearch && matchStatus;
        });

        currentPage = 1;
        renderTable();
    }

    // ── RENDER TABLE ──────────────────────────────────────────
    function renderTable() {
        document.getElementById("loading").style.display = "none";

        const tbody = document.getElementById("orders-body");
        tbody.innerHTML = "";

        if (filteredOrders.length === 0) {
            document.getElementById("orders-table").style.display = "none";
            document.getElementById("empty-state").style.display  = "block";
            document.getElementById("pagination").innerHTML = "";
            return;
        }

        document.getElementById("orders-table").style.display = "table";
        document.getElementById("empty-state").style.display  = "none";

        const start = (currentPage - 1) * PAGE_SIZE;
        const pageOrders = filteredOrders.slice(start, start + PAGE_SIZE);

        pageOrders.forEach(o => {
            const status = o.status || "PROCESSING";
            const badgeClass = {
                PROCESSING: "badge-processing",
                SHIPPED:    "badge-shipped",
                DELIVERED:  "badge-delivered",
                CANCELLED:  "badge-cancelled"
            }[status] || "badge-processing";

            const date = o.createdAt
                ? new Date(o.createdAt).toLocaleDateString("en-IN", { day:"2-digit", month:"short", year:"numeric" })
                : "—";

            tbody.innerHTML += `
                <tr>
                    <td><strong>#${o.id}</strong></td>
                    <td>${o.customerName || "User"}</td>
                    <td><strong>₹${(o.price || 0).toLocaleString()}</strong></td>
                    <td>${date}</td>
                    <td>
                        <select class="status-select" onchange="updateStatus(${o.id}, this.value)">
                            <option value="PROCESSING" ${status==="PROCESSING"?"selected":""}>Processing</option>
                            <option value="SHIPPED"    ${status==="SHIPPED"   ?"selected":""}>Shipped</option>
                            <option value="DELIVERED"  ${status==="DELIVERED" ?"selected":""}>Delivered</option>
                            <option value="CANCELLED"  ${status==="CANCELLED" ?"selected":""}>Cancelled</option>
                        </select>
                    </td>
                    <td>
                        <button class="btn-view" onclick="viewOrder(${o.id})">
                            <i class="fa-solid fa-eye"></i> View
                        </button>
                        <button class="btn-delete" onclick="deleteOrder(${o.id})" title="Delete">
                            <i class="fa-solid fa-trash-can"></i>
                        </button>
                    </td>
                </tr>
            `;
        });

        renderPagination();
    }

    // ── PAGINATION ────────────────────────────────────────────
    function renderPagination() {
        const total = Math.ceil(filteredOrders.length / PAGE_SIZE);
        const pg    = document.getElementById("pagination");
        pg.innerHTML = "";
        if (total <= 1) return;

        const prev = document.createElement("button");
        prev.innerHTML = "<i class='fa-solid fa-chevron-left'></i>";
        prev.disabled  = currentPage === 1;
        prev.onclick   = () => { currentPage--; renderTable(); };
        pg.appendChild(prev);

        for (let i = 1; i <= total; i++) {
            const btn = document.createElement("button");
            btn.innerText = i;
            if (i === currentPage) btn.classList.add("active");
            btn.onclick = () => { currentPage = i; renderTable(); };
            pg.appendChild(btn);
        }

        const next = document.createElement("button");
        next.innerHTML = "<i class='fa-solid fa-chevron-right'></i>";
        next.disabled  = currentPage === total;
        next.onclick   = () => { currentPage++; renderTable(); };
        pg.appendChild(next);
    }

    // ── UPDATE STATUS ─────────────────────────────────────────
    async function updateStatus(id, newStatus) {
        try {
            const res = await fetch(`${API}/api/order/${id}/status?status=${newStatus}`, {
                method: "PUT"
            });
            if (res.ok) {
                const order = allOrders.find(o => o.id === id);
                if (order) order.status = newStatus;
                updateStats();
            } else {
                alert("Failed to update status ❌");
            }
        } catch (err) {
            console.error(err);
            alert("Server error ❌");
        }
    }

    // ── VIEW ORDER MODAL ──────────────────────────────────────
    function viewOrder(id) {
        const o = allOrders.find(o => o.id === id);
        if (!o) return;
        const status = o.status || "PROCESSING";
        const date   = o.createdAt
            ? new Date(o.createdAt).toLocaleDateString("en-IN", { day:"2-digit", month:"short", year:"numeric" })
            : "—";

        document.getElementById("modal-content").innerHTML = `
            <div class="modal-row"><span>Order ID</span><span>#${o.id}</span></div>
            <div class="modal-row"><span>Customer</span><span>${o.customerName || "User"}</span></div>
            <div class="modal-row"><span>Amount</span><span>₹${(o.price || 0).toLocaleString()}</span></div>
            <div class="modal-row"><span>Date</span><span>${date}</span></div>
            <div class="modal-row"><span>Status</span><span><span class="badge badge-${status.toLowerCase()}">${status}</span></span></div>
            <div class="modal-row"><span>Address</span><span>${o.address || "—"}</span></div>
            <div class="modal-row"><span>Phone</span><span>${o.phone || "—"}</span></div>
        `;
        document.getElementById("modalOverlay").classList.add("active");
    }

    function closeModal() {
        document.getElementById("modalOverlay").classList.remove("active");
    }

    // Close modal on outside click
    document.getElementById("modalOverlay").addEventListener("click", function(e) {
        if (e.target === this) closeModal();
    });

    // ── DELETE ORDER ──────────────────────────────────────────
    async function deleteOrder(id) {
        if (!confirm("Are you sure you want to delete this order?")) return;
        try {
            const res = await fetch(`${API}/api/order/${id}`, { method: "DELETE" });
            if (res.ok) {
                allOrders      = allOrders.filter(o => o.id !== id);
                filteredOrders = filteredOrders.filter(o => o.id !== id);
                updateStats();
                renderTable();
                alert("Order deleted! ✅");
            } else {
                alert("Failed to delete order ❌");
            }
        } catch (err) {
            console.error(err);
            alert("Server error ❌");
        }
    }

    // ── INIT ──────────────────────────────────────────────────
    loadOrders();
</script>
</body>
</html>
